name: Diagnose guide browser tests

on:
  push:
    branches: [docs/beginner-field-guide]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/beginner-field-guide
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: Run browser tests with captured output
        run: |
          set +e
          npm run test:e2e 2>&1 | tee guide-e2e.log
          exit 0
      - name: Commit diagnostic log
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add guide-e2e.log
          git commit -m "Capture guide browser test failure"
          git push
