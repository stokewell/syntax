name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Format source
        run: >-
          npx prettier --write
          index.html
          demo/index.html
          demo/demo.css
          css/tokens.css
          css/themes.css
          css/style.css
          css/components/a11y.css
          css/components/buttons.css
          css/components/controls.css
          css/components/modal.css
          js/config/font-pairs.js
          js/utilities/theme-toggle.js
          js/utilities/font-switcher.js
          js/components/navigation.js
          js/components/modal.js
          js/components/web-components.js
          js/main.js
          scripts
          tests
          package.json
          eslint.config.js
          playwright.config.js
          .stylelintrc
          .stylelintrc.json
          .prettierrc.json
          .github/workflows/ci.yml
          README.md
          docs/STYLE_GUIDE.md
          v2-ideas.md
          CHANGELOG.md
          site.webmanifest

      - name: Upload formatted source
        uses: actions/upload-artifact@v4
        with:
          name: formatted-source
          include-hidden-files: true
          path: |
            index.html
            demo/index.html
            demo/demo.css
            css/tokens.css
            css/themes.css
            css/style.css
            css/components/a11y.css
            css/components/buttons.css
            css/components/controls.css
            css/components/modal.css
            js/config/font-pairs.js
            js/utilities/theme-toggle.js
            js/utilities/font-switcher.js
            js/components/navigation.js
            js/components/modal.js
            js/components/web-components.js
            js/main.js
            README.md
            docs/STYLE_GUIDE.md
            .stylelintrc
            .github/workflows/ci.yml

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css -- --formatter json > stylelint-report.json 2>&1

      - name: Upload CSS lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stylelint-report
          path: stylelint-report.json

      - name: Check formatting
        run: npm run format:check > prettier-report.txt 2>&1

      - name: Upload formatting report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prettier-report
          path: prettier-report.txt

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production bundle
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser and accessibility tests
        run: npm run test:e2e

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: syntax-dist
          path: dist/
