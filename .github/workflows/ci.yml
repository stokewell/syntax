name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Format source
        run: npm run format

      - name: Upload formatted source
        uses: actions/upload-artifact@v4
        with:
          name: formatted-source
          include-hidden-files: true
          path: |
            index.html
            demo/index.html
            demo/demo.css
            css/tokens.css
            css/reset.css
            css/themes.css
            css/style.css
            css/components/a11y.css
            css/components/grid.css
            css/components/modern-header.css
            css/components/sections.css
            css/components/features.css
            css/components/feature-card.css
            css/components/buttons.css
            css/components/controls.css
            css/components/modal.css
            js/config/font-pairs.js
            js/utilities/theme-toggle.js
            js/utilities/font-switcher.js
            js/components/navigation.js
            js/components/modal.js
            js/components/web-components.js
            js/main.js
            scripts/build.mjs
            tests/unit/font-pairs.test.js
            tests/e2e/demo.spec.js
            package.json
            eslint.config.js
            playwright.config.js
            .stylelintrc
            .prettierrc.json
            .github/workflows/ci.yml
            README.md
            docs/STYLE_GUIDE.md
            v2-ideas.md
            CHANGELOG.md
            site.webmanifest

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css -- --formatter json > stylelint-report.json 2>&1

      - name: Upload CSS lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stylelint-report
          path: stylelint-report.json

      - name: Check formatting
        run: npm run format:check > prettier-report.txt 2>&1

      - name: Upload formatting report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prettier-report
          path: prettier-report.txt

      - name: Run unit tests
        run: npm run test:unit > unit-test-report.txt 2>&1

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: unit-test-report.txt

      - name: Build production bundle
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser and accessibility tests
        run: npm run test:e2e > e2e-report.txt 2>&1

      - name: Upload browser test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report.txt

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: syntax-dist
          path: dist/
