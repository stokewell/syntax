name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - uses: actions/upload-artifact@v4
        with:
          name: syntax-dist
          path: dist/
