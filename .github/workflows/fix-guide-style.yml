name: Fix guide style

on:
  push:
    branches: [docs/beginner-field-guide]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/beginner-field-guide
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npx stylelint guide/guide.css --fix
      - run: npx prettier --write guide/guide.css
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add guide/guide.css
          git diff --cached --quiet || git commit -m "Fix guide stylesheet lint"
          git push
