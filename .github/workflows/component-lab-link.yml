name: Link Component Lab

on:
  pull_request:
    paths:
      - 'scripts/apply-component-lab-links.mjs'
      - '.github/workflows/component-lab-link.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install formatting tools
        run: npm install --ignore-scripts

      - name: Apply overview links and remove one-shot helper
        run: node scripts/apply-component-lab-links.mjs

      - name: Format canonical source
        run: npm run format

      - name: Commit generated overview navigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Link overview to Component Lab"
          git push origin HEAD:${{ github.head_ref }}
