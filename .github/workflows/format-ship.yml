name: Format Ship Mode

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npx prettier --write consumer/lib/ship.mjs consumer/lib/ship-files.mjs consumer/index.mjs scripts/prepare-ship.mjs tests/unit/consumer-ship.test.js docs/CONSUMER_SHIP.md package.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add consumer/lib/ship.mjs consumer/lib/ship-files.mjs consumer/index.mjs scripts/prepare-ship.mjs tests/unit/consumer-ship.test.js docs/CONSUMER_SHIP.md package.json
          git commit -m "Format Consumer Mode Ship source" || exit 0
          git push origin HEAD:${{ github.head_ref }}
