name: Apply Consumer Setup Phase

on:
  push:
    branches: [feature/consumer-setup-v1]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out setup branch
        uses: actions/checkout@v4
        with:
          ref: feature/consumer-setup-v1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Apply setup phase migration
        run: node scripts/apply-consumer-setup-phase.mjs

      - name: Format implementation
        run: npm run format

      - name: Remove one-shot migration
        run: |
          rm scripts/apply-consumer-setup-phase.mjs
          rm .github/workflows/apply-consumer-setup-phase.yml

      - name: Commit setup implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Build interactive Consumer Mode setup"
          git push origin HEAD:feature/consumer-setup-v1
