name: Fix Phase 2 Token Assertion

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('tests/unit/consumer-recipes.test.js')
          s = p.read_text().replace('--consumer-card-radius: 0.375rem', '--consumer-card-radius: var(--radius-sm)')
          p.write_text(s)
          PY
          rm .github/workflows/fix-phase2-token.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/consumer-recipes.test.js .github/workflows/fix-phase2-token.yml
          git commit -m "Align Technical direction assertion"
          git push origin HEAD:${{ github.head_ref }}
