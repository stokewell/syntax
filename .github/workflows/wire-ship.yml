name: Wire Ship Tooling

on:
  pull_request:

permissions:
  contents: write

jobs:
  wire:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - name: Wire Ship tooling into generated projects
        run: |
          python - <<'PY'
          from pathlib import Path

          file = Path('consumer/lib/project-files.mjs')
          text = file.read_text()
          if not text.startswith("import { createShipToolingFiles }"):
              text = "import { createShipToolingFiles } from './ship-project-files.mjs';\n\n" + text
          text = text.replace(
              "      serve: 'http-server . -p 4173 -c-1',\n      test: 'npm run test:consumer',",
              "      serve: 'http-server . -p 4173 -c-1',\n      'prepare:ship': 'node scripts/prepare-ship.mjs',\n      test: 'npm run test:consumer',",
          )
          text = text.replace(
              "  if (config.deployment === 'github-pages-root') {",
              "  files.push(...createShipToolingFiles());\n\n  if (config.deployment === 'github-pages-root') {",
          )
          file.write_text(text)

          file = Path('scripts/verify-consumer-setup.mjs')
          text = file.read_text()
          marker = "const playwrightCli = require.resolve('@playwright/test/cli');"
          block = """await new Promise((resolve, reject) => {
  const child = spawn(process.execPath, ['scripts/prepare-ship.mjs'], {
    cwd: output,
    stdio: 'inherit',
  });
  child.on('error', reject);
  child.on('exit', (code) => {
    if (code === 0) resolve();
    else reject(new Error(`Generated consumer Ship preview exited with code ${code}.`));
  });
});

"""
          if block not in text:
              text = text.replace(marker, block + marker)
          file.write_text(text)
          PY
      - run: npx prettier --write consumer/lib/project-files.mjs consumer/lib/ship-project-files.mjs scripts/verify-consumer-setup.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add consumer/lib/project-files.mjs consumer/lib/ship-project-files.mjs scripts/verify-consumer-setup.mjs
          git commit -m "Include Ship tooling in generated projects" || exit 0
          git push origin HEAD:${{ github.head_ref }}
