name: Roll out beginner guide

on:
  push:
    branches: [docs/beginner-field-guide]

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/beginner-field-guide
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Link guide from public demo and checks
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          demo = Path('demo/index.html')
          text = demo.read_text()
          text = text.replace('href="https://github.com/stokewell/syntax/generate"\n              >Use this template', 'href="../guide/"\n              >Read the field guide')
          text = text.replace('<li class="nav-item">\n              <a class="nav-link" href="../lab/">Component Lab</a>\n            </li>', '<li class="nav-item">\n              <a class="nav-link" href="../guide/">Field Guide</a>\n            </li>\n            <li class="nav-item">\n              <a class="nav-link" href="../lab/">Component Lab</a>\n            </li>', 1)
          text = text.replace('<li class="mobile-nav-item">\n            <a class="mobile-nav-link" href="../lab/">Component Lab</a>\n          </li>', '<li class="mobile-nav-item">\n            <a class="mobile-nav-link" href="../guide/">Field Guide</a>\n          </li>\n          <li class="mobile-nav-item">\n            <a class="mobile-nav-link" href="../lab/">Component Lab</a>\n          </li>', 1)
          demo.write_text(text)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['scripts']['lint:css'] = package['scripts']['lint:css'].replace('demo/demo.css lab/lab.css', 'demo/demo.css guide/guide.css lab/lab.css')
          package['scripts']['format'] = package['scripts']['format'].replace('demo/index.html demo/demo.css', 'demo/index.html demo/demo.css guide/index.html guide/guide.css guide/PROJECT_BRIEF.md guide/syntax.project.json')
          package['scripts']['format:check'] = package['scripts']['format:check'].replace('demo/index.html demo/demo.css', 'demo/index.html demo/demo.css guide/index.html guide/guide.css guide/PROJECT_BRIEF.md guide/syntax.project.json')
          package_path.write_text(json.dumps(package, indent=2) + '\n')
          PY
          npx prettier --write README.md demo/index.html guide/index.html guide/guide.css guide/PROJECT_BRIEF.md guide/syntax.project.json package.json tests/e2e/guide.spec.js
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md demo/index.html guide package.json tests/e2e/guide.spec.js
          git diff --cached --quiet || git commit -m "Integrate beginner field guide"
          git push
