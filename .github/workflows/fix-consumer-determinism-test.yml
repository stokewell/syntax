name: Fix Consumer Determinism Test

on:
  push:
    branches: [feature/consumer-recipes-v1]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out recipe branch
        uses: actions/checkout@v4
        with:
          ref: feature/consumer-recipes-v1

      - name: Patch test-only recipe contract
        run: |
          python <<'PY'
          from pathlib import Path

          test = Path('tests/unit/consumer-mode.test.js')
          text = test.read_text()
          old = """    const leftFiles = await createProjectFileSet({ config: left, recipe: foundationRecipe });
              const rightFiles = await createProjectFileSet({ config: right, recipe: foundationRecipe });
          """
          new = """    const deterministicRecipe = {
                ...foundationRecipe,
                compatibleFeatures: ['theme', 'dialog'],
              };
              const leftFiles = await createProjectFileSet({ config: left, recipe: deterministicRecipe });
              const rightFiles = await createProjectFileSet({ config: right, recipe: deterministicRecipe });
          """
          if old not in text:
              raise SystemExit('Expected determinism test block was not found.')
          test.write_text(text.replace(old, new))
          PY
          rm -f consumer-unit.log
          rm .github/workflows/fix-consumer-determinism-test.yml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and format
        run: |
          npm install --ignore-scripts
          npm run format

      - name: Commit test correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Fix Consumer Mode determinism fixture test"
          git push origin HEAD:feature/consumer-recipes-v1
