name: Format Consumer Setup

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Restore final CI workflow
        run: |
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            quality:
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install --ignore-scripts

                - name: Lint JavaScript
                  run: npm run lint:js

                - name: Lint CSS
                  run: npm run lint:css

                - name: Check formatting
                  run: npm run format:check

                - name: Run unit tests
                  run: npm run test:unit

                - name: Build production bundle
                  run: npm run build

                - name: Install Chromium
                  run: npx playwright install --with-deps chromium

                - name: Run browser and accessibility tests
                  run: npm run test:e2e

                - name: Verify generated consumer project
                  run: npm run test:consumer-setup

                - name: Upload production bundle
                  uses: actions/upload-artifact@v4
                  with:
                    name: syntax-dist
                    path: dist/
          YAML

      - name: Format repository source
        run: npm run format

      - name: Remove temporary setup files
        run: |
          rm -f consumer/setup.trigger
          rm .github/workflows/format-consumer-setup.yml

      - name: Commit canonical source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Format Consumer Mode setup source"
          git push origin HEAD:${{ github.head_ref }}
