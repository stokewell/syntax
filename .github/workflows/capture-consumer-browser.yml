name: Capture Consumer Browser Failure

on:
  push:
    branches: [feature/consumer-recipes-v1]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out recipe branch
        uses: actions/checkout@v4
        with:
          ref: feature/consumer-recipes-v1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and Chromium
        run: |
          npm install --ignore-scripts
          npx playwright install --with-deps chromium

      - name: Generate recipe previews
        run: npm run consumer:previews

      - name: Capture recipe browser output
        run: npx playwright test tests/e2e/consumer-recipes.spec.js --reporter=list > consumer-browser.log 2>&1 || true

      - name: Remove generated output and diagnostic workflow
        run: |
          rm -rf consumer/previews
          rm .github/workflows/capture-consumer-browser.yml

      - name: Commit diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add consumer-browser.log .github/workflows/capture-consumer-browser.yml
          git commit -m "Capture Consumer Mode browser failure"
          git push origin HEAD:feature/consumer-recipes-v1
