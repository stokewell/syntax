name: Format Consumer Foundation

on:
  pull_request:
    paths:
      - 'consumer/**'
      - 'tests/unit/consumer-mode.test.js'
      - 'scripts/generate-consumer-fixtures.mjs'
      - 'docs/CONSUMER_MODE_OWNERSHIP.md'
      - 'package.json'
      - '.github/workflows/format-consumer-foundation.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Format Consumer Mode source
        run: npm run format

      - name: Regenerate canonical fixture
        run: npm run consumer:fixtures

      - name: Verify canonical formatting
        run: npm run format:check

      - name: Remove one-shot formatter
        run: rm .github/workflows/format-consumer-foundation.yml

      - name: Commit canonical output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Format generated Consumer Mode files"
          git push origin HEAD:${{ github.head_ref }}
